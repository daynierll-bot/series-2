<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sección de Películas</title>
    <style>
        /* Estilos base para el look de Netflix */
        body {
            background-color: #000000; /* Fondo negro */
            color: #E50914;           /* Rojo Netflix */
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;           /* Centrado vertical en toda la pantalla */
            margin: 0;
            text-align: center;
        }

        /* Estilo para el texto grande */
        h1 {
            font-size: 3rem;         /* Tamaño grande */
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            padding: 0 20px;
        }

        /* Estilo para el botón */
        .btn-volver {
            background-color: #E50914;
            color: white;
            padding: 12px 24px;
            text-decoration: none;    /* Quitar subrayado de link */
            font-weight: bold;
            border-radius: 4px;
            transition: background-color 0.3s ease;
            font-size: 1.1rem;
        }

        /* Efecto al pasar el mouse por el botón */
        .btn-volver:hover {
            background-color: #b20710;
        }
    </style>
</head>
<body>

    <h1>Sin películas aún, dirígete a la sección de series</h1>

    <a href="index.html" class="btn-volver">VOLVER AL INICIO</a>

</body>
</html>
