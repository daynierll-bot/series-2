 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATÁLOGO SERIES Y PELICULAS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent-color: #ffffff; 
            --bg-color: #050505;
            --transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            color: white;
        }

        .main-header {
            position: absolute;
            top: 40px;
            width: 100%;
            text-align: center;
            z-index: 10;
            letter-spacing: 0.5rem;
            pointer-events: none;
        }

        .main-header h1 {
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
            opacity: 0.7;
            margin: 0;
        }

        /* Contenedor ajustado para 3 secciones */
        .split-container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        .pane {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-decoration: none;
            transition: var(--transition);
        }

        .pane-img {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: brightness(0.4) scale(1.05);
            transition: var(--transition);
            z-index: 1;
        }

        .pane-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            z-index: 2;
            transition: var(--transition);
        }

        .pane-content {
            position: relative;
            z-index: 3;
            text-align: center;
            padding: 20px;
        }

        .pane-content h2 {
            font-size: 4vw; /* Un poco más pequeño para que quepan 3 */
            font-weight: 900;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: -2px;
            line-height: 0.9;
            transition: var(--transition);
        }

        .pane-content p {
            font-size: 0.8rem;
            letter-spacing: 3px;
            margin-top: 10px;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(20px);
            transition: var(--transition);
        }

        /* Hover: El panel seleccionado crece mientras los otros se encogen */
        .pane:hover {
            flex: 2; 
        }

        .pane:hover .pane-img {
            filter: brightness(0.6) scale(1);
        }

        .pane:hover .pane-content h2 {
            transform: scale(1.1);
            color: var(--accent-color);
        }

        .pane:hover .pane-content p {
            opacity: 1;
            transform: translateY(0);
        }

        /* Líneas divisorias (solo visibles entre paneles) */
        .pane:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0;
            top: 25%;
            bottom: 25%;
            width: 1px;
            background: rgba(255,255,255,0.15);
            z-index: 4;
        }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            .split-container { flex-direction: column; }
            .pane-content h2 { font-size: 2.5rem; }
            .pane:hover { flex: 1.5; }
            .pane:not(:last-child)::after { display: none; }
            .main-header { top: 20px; }
        }
    </style>
</head>
<body>
 <header class="main-header">
        <h1>Explorar Catálogo</h1>
    </header>

    <div class="split-container">

        <a href="series.html" class="pane">
            <div class="pane-img" style="background-image: url('https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=2070&auto=format&fit=crop');"></div>
            <div class="pane-overlay"></div>
            <div class="pane-content">
                <h2>SERIES</h2>
                <p>Temporadas completas</p>
            </div>
        </a>

        <a href="catalogo de peliculas.html" class="pane">
            <div class="pane-img" style="background-image: url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=1925&auto=format&fit=crop');"></div>
            <div class="pane-overlay"></div>
            <div class="pane-content">
                <h2>PELICULAS</h2>
                <p>Estrenos mundiales</p>
            </div>
        </a>

        <a href="animados.html" class="pane">
            <div class="pane-img" style="background-image: url('https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=2094&auto=format&fit=crop');"></div>
            <div class="pane-overlay"></div>
            <div class="pane-content">
                <h2>ANIMADOS</h2>
                <p>Animación y fantasía</p>
            </div>
        </a>

    </div>

</body>
</html>
